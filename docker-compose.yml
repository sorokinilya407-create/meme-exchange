version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: meme_user
      POSTGRES_PASSWORD: your_strong_password
      POSTGRES_DB: meme_exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
volumes:
  pgdata: