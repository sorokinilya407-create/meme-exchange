<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEME XCHANGE — Биржа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0A0A0F;--card:#111117;--green:#00FF88;--purple:#9D4EDD;--red:#FF3366;--text:#EDEDED;--muted:#7A7A8C;--border:#23232E}
        body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);padding:20px}
        .container{max-width:1600px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:20px;border-bottom:1px solid var(--border)}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{background:linear-gradient(135deg,var(--green),var(--purple));width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
        .balance{font-family:'JetBrains Mono',monospace;color:var(--green);font-size:1.3rem}
        .exchange-grid{display:grid;grid-template-columns:1fr 350px;gap:20px}
        .assets-section{background:var(--card);border-radius:24px;padding:20px;border:1px solid var(--border)}
        .assets-grid{display:flex;flex-direction:column;gap:12px;margin-top:15px}
        .asset-card{background:rgba(13,13,18,0.8);border-radius:16px;padding:15px;border:1px solid var(--border);cursor:pointer}
        .asset-card.active{border:2px solid var(--green)}
        .asset-row{display:flex;justify-content:space-between;align-items:center}
        .asset-info{display:flex;align-items:center;gap:12px}
        .asset-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:rgba(0,255,136,0.05);border:1px solid var(--border);overflow:hidden}
        .asset-icon img{width:100%;height:100%;object-fit:cover}
        .asset-price{font-family:'JetBrains Mono',monospace;font-weight:700}
        .change-positive{color:var(--green)} .change-negative{color:var(--red)}
        .btn-sm{flex:1;padding:8px;border-radius:20px;font-weight:600;cursor:pointer;background:transparent}
        .btn-buy-sm{background:rgba(0,255,136,0.1);border:1px solid var(--green);color:var(--green)}
        .btn-sell-sm{background:rgba(255,51,102,0.1);border:1px solid var(--red);color:var(--red)}
        .chart-container{margin-top:20px;background:#0A0A0F;border-radius:16px;padding:15px}
        canvas{max-height:200px}
        .panel-card{background:var(--card);border-radius:20px;padding:20px;border:1px solid var(--border);margin-bottom:20px}
        .book-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:6px 0;font-family:'JetBrains Mono',monospace}
        .buy-color{color:var(--green)} .sell-color{color:var(--red)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:var(--card);border:1px solid var(--green);border-radius:24px;padding:25px;width:90%;max-width:400px;text-align:center}
        .modal-content input{background:#0A0A0F;border:1px solid var(--border);color:white;padding:12px;width:100%;border-radius:40px;margin:10px 0;text-align:center}
        .btn-confirm{background:var(--green);border:none;padding:12px;border-radius:40px;font-weight:700;cursor:pointer;flex:1}
        .btn-cancel{background:#2A2A35;border:none;padding:12px;border-radius:40px;cursor:pointer;flex:1}
        .quick-nav{display:flex;justify-content:center;gap:30px;margin-top:40px;padding-top:20px;border-top:1px solid var(--border)}
        .quick-nav a{color:var(--muted);text-decoration:none;font-weight:600}
        .toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#0A0A0F;padding:12px 20px;border-radius:40px;z-index:9999}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon">⧉</div><h1>MEME XCHANGE · БИРЖА</h1></div>
        <div class="balance" id="balanceDisplay">-- MC</div>
    </div>
    <div class="exchange-grid">
        <div class="assets-section">
            <h3>Торгуемые мемы</h3>
            <div class="assets-grid" id="assetsList">Загрузка...</div>
            <div class="chart-container"><canvas id="priceChart"></canvas></div>
        </div>
        <div>
            <div class="panel-card"><h4>Стакан</h4><div id="orderBook"></div></div>
            <div class="panel-card"><h4>История сделок</h4><div id="tradeHistory">Нет сделок</div></div>
        </div>
    </div>
    <div class="quick-nav"><a href="index.html">Главная</a><a href="clans.html">Кланы</a><a href="portfolio.html">Портфель</a><a href="deposit.html">Пополнение</a></div>
</div>
<div id="tradeModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Купить</h3>
        <p>Цена: <span id="modalPrice">0</span> MC</p>
        <input type="number" id="modalAmount" value="1" step="0.1">
        <p>Итого: <span id="modalTotal">0</span> MC</p>
        <div style="display:flex;gap:10px;"><button id="modalConfirm" class="btn-confirm">OK</button><button id="modalCancel" class="btn-cancel">Отмена</button></div>
    </div>
</div>
<script src="https://meme-exchange-backend.onrender.com/socket.io/socket.io.js"></script>
<script>
    const API_BASE='https://meme-exchange-backend.onrender.com';
    function showToast(m,ok=true){ const t=document.createElement('div'); t.className='toast'; t.style.background=ok?'#00FF88':'#FF3366'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function apiRequest(url,method='GET',body=null){ const u=url.startsWith('/api')?API_BASE+url:url; const o={method,credentials:'include',headers:{'Content-Type':'application/json'}}; if(body) o.body=JSON.stringify(body); const r=await fetch(u,o); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
    async function checkAuth(){ try{ await apiRequest('/api/user/profile'); return true; }catch(e){ window.location.href='/login.html'; return false; } }
    async function loadBalance(){ try{ const d=await apiRequest('/api/user/balance'); document.getElementById('balanceDisplay').innerHTML=`${d.balance.toLocaleString()} MC`; return d.balance; }catch(e){return 0;} }
    function getMemeDisplay(m){ if(m.image_url) return `<img src="${m.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`; return m.icon||'📦'; }
    let memes=[], selected=null, chart=null, modalType=null, modalAsset=null;
    async function loadMemes(){ memes=await apiRequest('/api/memes'); renderAssets(); }
    function renderAssets(){
        const c=document.getElementById('assetsList');
        c.innerHTML=memes.map(m=>{ const p=Number(m.price), ch=Number(m.change_24h); return `<div class="asset-card ${selected?.id===m.id?'active':''}" data-id="${m.id}"><div class="asset-row"><div class="asset-info"><div class="asset-icon">${getMemeDisplay(m)}</div><div><div>${m.name}</div><small>${m.name}</small></div></div><div><div class="asset-price">${p.toFixed(2)} MC</div><div class="${ch>=0?'change-positive':'change-negative'}">${ch>=0?'▲':'▼'}${Math.abs(ch).toFixed(1)}%</div></div></div><div style="display:flex;gap:8px;margin-top:10px;"><button class="btn-sm btn-buy-sm" data-id="${m.id}">Купить</button><button class="btn-sm btn-sell-sm" data-id="${m.id}">Продать</button></div></div>`; }).join('');
        document.querySelectorAll('.asset-card').forEach(card=>card.addEventListener('click',e=>{ if(e.target.tagName!=='BUTTON'){ selected=memes.find(m=>m.id===parseInt(card.dataset.id)); renderAssets(); updateChart(); } }));
        document.querySelectorAll('.btn-buy-sm').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); openModal('buy',memes.find(m=>m.id===parseInt(b.dataset.id))); }));
        document.querySelectorAll('.btn-sell-sm').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); openModal('sell',memes.find(m=>m.id===parseInt(b.dataset.id))); }));
        if(!selected&&memes.length) selected=memes[0];
        if(selected) updateChart();
    }
    function updateChart(){ if(!selected) return; const ctx=document.getElementById('priceChart').getContext('2d'); if(chart) chart.destroy(); const p=Number(selected.price); chart=new Chart(ctx,{type:'line',data:{labels:['6д','5д','4д','3д','2д','Вчера','Сегодня'],datasets:[{label:selected.name,data:[p*0.88,p*0.92,p*0.96,p*1.02,p*1.05,p*1.01,p],borderColor:'#00FF88',backgroundColor:'rgba(0,255,136,0.05)'}]},options:{responsive:true,plugins:{legend:{display:false}}}}); }
    function openModal(type,asset){ modalType=type; modalAsset=asset; document.getElementById('modalTitle').innerHTML=`${type==='buy'?'🟢 Купить':'🔴 Продать'} ${asset.name}`; document.getElementById('modalPrice').textContent=Number(asset.price).toFixed(2); document.getElementById('modalAmount').value=1; updateModalTotal(); document.getElementById('tradeModal').style.display='flex'; }
    function updateModalTotal(){ document.getElementById('modalTotal').textContent=((parseFloat(document.getElementById('modalAmount').value)||0)*Number(modalAsset?.price||0)).toFixed(2); }
    function closeModal(){ document.getElementById('tradeModal').style.display='none'; }
    async function confirmModal(){ if(!modalAsset) return; const amt=parseFloat(document.getElementById('modalAmount').value); if(isNaN(amt)||amt<=0){ showToast('Введите количество',false); return; } try{ if(modalType==='buy') await apiRequest('/api/trades/buy','POST',{memeId:modalAsset.id,quantity:amt}); else await apiRequest('/api/trades/sell','POST',{memeId:modalAsset.id,quantity:amt}); showToast(`✅ ${modalType==='buy'?'Куплено':'Продано'} ${amt} ${modalAsset.name}`,true); loadBalance(); loadMemes(); closeModal(); }catch(e){ showToast(e.message,false); } }
    async function init(){ if(!await checkAuth()) return; await loadBalance(); await loadMemes(); document.getElementById('modalConfirm').onclick=confirmModal; document.getElementById('modalCancel').onclick=closeModal; document.getElementById('modalAmount').oninput=updateModalTotal; const socket=io(API_BASE); socket.on('priceUpdate',prices=>{ prices.forEach(p=>{ const m=memes.find(x=>x.id===p.id); if(m){ m.price=p.price; m.change_24h=p.change_24h; } }); renderAssets(); if(selected){ const u=memes.find(m=>m.id===selected.id); if(u) selected=u; updateChart(); } }); }
    init();
</script>
</body>
</html>
