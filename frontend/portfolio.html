<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEME XCHANGE — Портфель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;font-family:'Inter',sans-serif;color:#EDEDED;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:20px;border-bottom:1px solid #23232E}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{background:linear-gradient(135deg,#00FF88,#9D4EDD);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
        .balance{font-family:'JetBrains Mono',monospace;color:#00FF88;font-size:1.3rem}
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}
        .stat-card{background:#111117;border-radius:20px;padding:20px;border:1px solid #23232E}
        .stat-value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;color:#00FF88}
        .assets-table{width:100%;border-collapse:collapse}
        .assets-table th{text-align:left;padding:15px;background:rgba(0,255,136,0.05);color:#00FF88}
        .assets-table td{padding:15px;border-bottom:1px solid #23232E}
        .asset-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#0A0A0F;overflow:hidden}
        .asset-icon img{width:100%;height:100%;object-fit:cover}
        .profit-positive{color:#00FF88} .profit-negative{color:#FF3366}
        .history-list{max-height:300px;overflow-y:auto}
        .history-item{display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid #23232E}
        .btn-action{background:#00FF88;color:#0A0A0F;border:none;padding:12px 30px;border-radius:30px;font-weight:700;cursor:pointer}
        .quick-nav{display:flex;justify-content:center;gap:30px;margin-top:40px;padding-top:20px;border-top:1px solid #23232E}
        .quick-nav a{color:#7A7A8C;text-decoration:none;font-weight:600}
        .toast{position:fixed;bottom:20px;right:20px;background:#00FF88;color:#0A0A0F;padding:12px 20px;border-radius:40px;z-index:9999}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon">💼</div><h1>MEME XCHANGE · ПОРТФЕЛЬ</h1></div>
        <div class="balance" id="balanceDisplay">-- MC</div>
    </div>
    <div class="stats-row">
        <div class="stat-card"><div>Баланс</div><div class="stat-value" id="cashBalance">0 MC</div></div>
        <div class="stat-card"><div>Активы</div><div class="stat-value" id="assetsValue">0 MC</div></div>
        <div class="stat-card"><div>Капитал</div><div class="stat-value" id="totalCapital">0 MC</div></div>
    </div>
    <h3>Мои активы</h3>
    <table class="assets-table"><thead><tr><th>Актив</th><th>Кол-во</th><th>Ср.цена</th><th>Тек.цена</th><th>Стоимость</th><th>P/L</th></tr></thead><tbody id="assetsBody"></tbody></table>
    <h3 style="margin-top:30px;">История</h3>
    <div class="history-list" id="historyBody"></div>
    <div style="margin-top:20px;text-align:center;"><button class="btn-action" id="depositBtn">Пополнить</button></div>
    <div class="quick-nav"><a href="index.html">Главная</a><a href="birga.html">Биржа</a><a href="clans.html">Кланы</a><a href="deposit.html">Пополнение</a></div>
</div>
<script>
    const API_BASE='https://meme-exchange-backend.onrender.com';
    function showToast(m,ok=true){ const t=document.createElement('div'); t.className='toast'; t.style.background=ok?'#00FF88':'#FF3366'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function apiRequest(url,method='GET',body=null){ const u=url.startsWith('/api')?API_BASE+url:url; const o={method,credentials:'include',headers:{'Content-Type':'application/json'}}; if(body) o.body=JSON.stringify(body); const r=await fetch(u,o); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
    async function checkAuth(){ try{ await apiRequest('/api/user/profile'); return true; }catch(e){ window.location.href='/login.html'; return false; } }
    let balance=0;
    function getMemeDisplay(m){ if(m.image_url) return `<img src="${m.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">`; return m.icon||'📦'; }
    async function loadBalance(){ const d=await apiRequest('/api/user/balance'); balance=d.balance; document.getElementById('balanceDisplay').innerHTML=`${balance.toLocaleString()} MC`; document.getElementById('cashBalance').textContent=`${balance.toLocaleString()} MC`; }
    async function loadAssets(){ const a=await apiRequest('/api/portfolio/assets'); let total=0,cost=0; document.getElementById('assetsBody').innerHTML=a.map(x=>{ const cur=Number(x.current_price), avg=Number(x.avg_price), q=Number(x.quantity), val=q*cur, cst=q*avg, prof=val-cst; total+=val; cost+=cst; return `<tr><td><div style="display:flex;align-items:center;gap:10px;"><div class="asset-icon">${getMemeDisplay(x)}</div>${x.name}</div></td><td>${q}</td><td>${avg.toFixed(2)}</td><td>${cur.toFixed(2)}</td><td>${val.toFixed(2)}</td><td class="${prof>=0?'profit-positive':'profit-negative'}">${prof>=0?'+':''}${prof.toFixed(2)}</td></tr>`; }).join(''); document.getElementById('assetsValue').textContent=total.toFixed(2)+' MC'; document.getElementById('totalCapital').textContent=(balance+total).toFixed(2)+' MC'; }
    async function loadHistory(){ const h=await apiRequest('/api/portfolio/history'); document.getElementById('historyBody').innerHTML=h.map(t=>`<div class="history-item"><span>${t.type==='buy'?'Покупка':'Продажа'} ${t.asset}</span><span>${t.quantity} шт × ${Number(t.price).toFixed(2)}</span><span class="${t.type==='buy'?'profit-positive':'profit-negative'}">${t.type==='buy'?'-':'+'}${(t.quantity*t.price).toFixed(2)} MC</span></div>`).join(''); }
    async function init(){ if(!await checkAuth()) return; await loadBalance(); await loadAssets(); await loadHistory(); document.getElementById('depositBtn').onclick=()=>window.location.href='deposit.html'; }
    init();
</script>
</body>
</html>
