<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEME XCHANGE — Пополнение</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;font-family:'Inter',sans-serif;color:#EDEDED;padding:20px}
        .container{max-width:1000px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:20px;border-bottom:1px solid #23232E}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{background:linear-gradient(135deg,#00FF88,#9D4EDD);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
        .balance{font-family:'JetBrains Mono',monospace;color:#00FF88;font-size:1.3rem}
        .warning{background:rgba(255,215,0,0.05);border:1px solid #FFD966;border-radius:20px;padding:20px;text-align:center;margin-bottom:30px}
        .packages{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:30px}
        .package-card{background:#111117;border-radius:24px;padding:25px;text-align:center;border:1px solid #23232E}
        .package-mc{font-size:2rem;font-weight:800;color:#00FF88;margin:15px 0}
        .package-price{font-size:1.8rem;font-weight:700}
        .btn-package{background:transparent;border:1px solid #00FF88;color:#00FF88;padding:12px;width:100%;border-radius:30px;font-weight:700;cursor:pointer;margin-top:15px}
        .quick-nav{display:flex;justify-content:center;gap:30px;margin-top:40px;padding-top:20px;border-top:1px solid #23232E}
        .quick-nav a{color:#7A7A8C;text-decoration:none;font-weight:600}
        .toast{position:fixed;bottom:20px;right:20px;background:#00FF88;color:#0A0A0F;padding:12px 20px;border-radius:40px;z-index:9999}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon">💰</div><h1>MEME XCHANGE · ПОПОЛНЕНИЕ</h1></div>
        <div class="balance" id="balanceDisplay">-- MC</div>
    </div>
    <div class="warning"><i class="fas fa-shield-heart" style="font-size:2rem;color:#FFD966;"></i><h2>Поддержи проект — получи MC</h2><p>Демо-режим. Средства не списываются.</p></div>
    <div class="packages">
        <div class="package-card"><div class="package-mc">100 MC</div><div class="package-price">50 ₽</div><button class="btn-package" data-mc="100">Купить</button></div>
        <div class="package-card" style="border-color:#9D4EDD"><div class="package-mc">500 MC</div><div class="package-price">200 ₽</div><button class="btn-package" data-mc="500">Купить</button></div>
        <div class="package-card"><div class="package-mc">2000 MC</div><div class="package-price">700 ₽</div><button class="btn-package" data-mc="2000">Купить</button></div>
    </div>
    <div class="quick-nav"><a href="index.html">Главная</a><a href="birga.html">Биржа</a><a href="clans.html">Кланы</a><a href="portfolio.html">Портфель</a></div>
</div>
<script>
    const API_BASE='https://meme-exchange-backend.onrender.com';
    function showToast(m,ok=true){ const t=document.createElement('div'); t.className='toast'; t.style.background=ok?'#00FF88':'#FF3366'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function apiRequest(url,method='GET',body=null){ const u=url.startsWith('/api')?API_BASE+url:url; const o={method,credentials:'include',headers:{'Content-Type':'application/json'}}; if(body) o.body=JSON.stringify(body); const r=await fetch(u,o); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
    async function checkAuth(){ try{ await apiRequest('/api/user/profile'); return true; }catch(e){ window.location.href='/login.html'; return false; } }
    async function loadBalance(){ try{ const d=await apiRequest('/api/user/balance'); document.getElementById('balanceDisplay').innerHTML=`${d.balance.toLocaleString()} MC`; }catch(e){} }
    document.querySelectorAll('.btn-package').forEach(b=>b.addEventListener('click',()=>{ if(confirm(`Получить ${b.dataset.mc} MC для теста?`)){ showToast(`✅ Начислено ${b.dataset.mc} MC!`,true); loadBalance(); } }));
    async function init(){ if(!await checkAuth()) return; await loadBalance(); }
    init();
</script>
</body>
</html>
