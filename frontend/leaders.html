<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEME XCHANGE — Топ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;font-family:'Inter',sans-serif;color:#EDEDED;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:20px;border-bottom:1px solid #23232E}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{background:linear-gradient(135deg,#00FF88,#9D4EDD);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
        .balance{font-family:'JetBrains Mono',monospace;color:#00FF88;font-size:1.3rem}
        .tabs{display:flex;gap:10px;margin-bottom:20px}
        .tab-btn{flex:1;padding:12px;background:#111117;border:1px solid #23232E;color:#7A7A8C;font-weight:600;cursor:pointer;border-radius:40px}
        .tab-btn.active{background:#00FF88;color:#0A0A0F;border-color:#00FF88}
        .rank-table{width:100%;border-collapse:collapse}
        .rank-table th{text-align:left;padding:15px;background:rgba(0,255,136,0.05);color:#00FF88}
        .rank-table td{padding:15px;border-bottom:1px solid #23232E}
        .rank-1{color:#FFD700}.rank-2{color:#C0C0C0}.rank-3{color:#CD7F32}
        .quick-nav{display:flex;justify-content:center;gap:30px;margin-top:40px;padding-top:20px;border-top:1px solid #23232E}
        .quick-nav a{color:#7A7A8C;text-decoration:none;font-weight:600}
        .toast{position:fixed;bottom:20px;right:20px;background:#00FF88;color:#0A0A0F;padding:12px 20px;border-radius:40px;z-index:9999}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon">🏆</div><h1>MEME XCHANGE · ТОП</h1></div>
        <div class="balance" id="balanceDisplay">-- MC</div>
    </div>
    <div class="tabs"><button class="tab-btn active" data-tab="capital">Капитал</button><button class="tab-btn" data-tab="traders">Трейдеры</button><button class="tab-btn" data-tab="clans">Кланы</button></div>
    <div id="tab-capital"><table class="rank-table"><thead><tr><th>Место</th><th>Игрок</th><th>Капитал</th></tr></thead><tbody id="capitalBody"></tbody></table></div>
    <div id="tab-traders" style="display:none"><table class="rank-table"><thead><tr><th>Место</th><th>Игрок</th><th>Сделок (7д)</th></tr></thead><tbody id="tradersBody"></tbody></table></div>
    <div id="tab-clans" style="display:none"><table class="rank-table"><thead><tr><th>Место</th><th>Клан</th><th>Капитал</th></tr></thead><tbody id="clansBody"></tbody></table></div>
    <div class="quick-nav"><a href="index.html">Главная</a><a href="birga.html">Биржа</a><a href="clans.html">Кланы</a><a href="portfolio.html">Портфель</a></div>
</div>
<script>
    const API_BASE='https://meme-exchange-backend.onrender.com';
    function showToast(m,ok=true){ const t=document.createElement('div'); t.className='toast'; t.style.background=ok?'#00FF88':'#FF3366'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function apiRequest(url,method='GET',body=null){ const u=url.startsWith('/api')?API_BASE+url:url; const o={method,credentials:'include',headers:{'Content-Type':'application/json'}}; if(body) o.body=JSON.stringify(body); const r=await fetch(u,o); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
    async function checkAuth(){ try{ await apiRequest('/api/user/profile'); return true; }catch(e){ window.location.href='/login.html'; return false; } }
    async function loadBalance(){ try{ const d=await apiRequest('/api/user/balance'); document.getElementById('balanceDisplay').innerHTML=`${d.balance.toLocaleString()} MC`; }catch(e){} }
    function getRankBadge(i){ if(i===0) return '<span class="rank-1"><i class="fas fa-crown"></i> 1</span>'; if(i===1) return '<span class="rank-2"><i class="fas fa-medal"></i> 2</span>'; if(i===2) return '<span class="rank-3"><i class="fas fa-medal"></i> 3</span>'; return i+1; }
    async function loadCapital(){ const d=await apiRequest('/api/leaders/capital'); document.getElementById('capitalBody').innerHTML=d.map((u,i)=>`<tr><td>${getRankBadge(i)}</td><td>${u.username}</td><td>${Math.floor(u.balance).toLocaleString()} MC</td></tr>`).join(''); }
    async function loadTraders(){ const d=await apiRequest('/api/leaders/traders'); document.getElementById('tradersBody').innerHTML=d.map((u,i)=>`<tr><td>${getRankBadge(i)}</td><td>${u.username}</td><td>${u.trades_count||0}</td></tr>`).join(''); }
    async function loadClans(){ const d=await apiRequest('/api/leaders/clans'); document.getElementById('clansBody').innerHTML=d.map((c,i)=>`<tr><td>${getRankBadge(i)}</td><td>${c.name}</td><td>${Math.floor(c.capital||0).toLocaleString()} MC</td></tr>`).join(''); }
    document.querySelectorAll('.tab-btn').forEach(t=>t.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); t.classList.add('active'); document.querySelectorAll('[id^="tab-"]').forEach(c=>c.style.display='none'); document.getElementById(`tab-${t.dataset.tab}`).style.display='block'; }));
    async function init(){ if(!await checkAuth()) return; await loadBalance(); loadCapital(); loadTraders(); loadClans(); }
    init();
</script>
</body>
</html>
