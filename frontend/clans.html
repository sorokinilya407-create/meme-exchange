<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEME XCHANGE — Кланы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;font-family:'Inter',sans-serif;color:#EDEDED;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:15px;margin-bottom:20px;border-bottom:1px solid #23232E}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{background:linear-gradient(135deg,#00FF88,#9D4EDD);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800}
        .balance{font-family:'JetBrains Mono',monospace;color:#00FF88;font-size:1.3rem}
        .clans-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
        .clan-card{background:#111117;border-radius:20px;padding:20px;border:1px solid #23232E;margin-bottom:15px}
        .clan-header{display:flex;align-items:center;gap:15px}
        .clan-avatar{width:50px;height:50px;background:#1A1A24;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:1px solid #9D4EDD}
        .btn-join{background:rgba(0,255,136,0.1);border:1px solid #00FF88;color:#00FF88;padding:8px 20px;border-radius:30px;font-weight:700;cursor:pointer}
        .war-card{background:#111117;border-radius:20px;padding:20px;border:1px solid #FF3366}
        .chat-messages{background:#0A0A0F;border-radius:15px;padding:15px;height:200px;overflow-y:auto}
        .chat-input{display:flex;gap:10px;margin-top:10px}
        .chat-input input{flex:1;background:#0A0A0F;border:1px solid #2A2A35;padding:10px;border-radius:30px;color:white}
        .toast{position:fixed;bottom:20px;right:20px;background:#00FF88;color:#0A0A0F;padding:12px 20px;border-radius:40px;z-index:9999}
        .quick-nav{display:flex;justify-content:center;gap:30px;margin-top:40px;padding-top:20px;border-top:1px solid #23232E}
        .quick-nav a{color:#7A7A8C;text-decoration:none;font-weight:600}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon">⚔️</div><h1>MEME XCHANGE · КЛАНЫ</h1></div>
        <div class="balance" id="balanceDisplay">-- MC</div>
    </div>
    <div class="clans-grid">
        <div><h3>Существующие кланы</h3><div id="clansList">Загрузка...</div></div>
        <div>
            <div class="war-card"><h3>⚔️ АКТИВНАЯ ВОЙНА</h3><div id="warContent">Нет активной войны</div></div>
            <div style="background:#111117;border-radius:20px;padding:20px;margin:20px 0;"><h3>Создать клан</h3><input type="text" id="clanName" placeholder="Название" style="width:100%;padding:10px;margin:10px 0;background:#0A0A0F;border:1px solid #2A2A35;color:white;border-radius:30px;"><input type="text" id="clanAvatar" placeholder="Эмодзи" value="🏰" maxlength="2" style="width:100%;padding:10px;margin:10px 0;background:#0A0A0F;border:1px solid #2A2A35;color:white;border-radius:30px;"><button id="createClanBtn" style="background:#00FF88;color:#0A0A0F;border:none;padding:12px;width:100%;border-radius:30px;font-weight:700;cursor:pointer;">Создать (5000 MC)</button></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input"><input type="text" id="chatInput" placeholder="Напиши в чат..."><button id="sendChatBtn" style="background:#9D4EDD;border:none;padding:10px 20px;border-radius:30px;color:white;cursor:pointer;">➤</button></div>
        </div>
    </div>
    <div class="quick-nav"><a href="index.html">Главная</a><a href="birga.html">Биржа</a><a href="portfolio.html">Портфель</a><a href="deposit.html">Пополнение</a></div>
</div>
<script>
    const API_BASE='https://meme-exchange-backend.onrender.com';
    function showToast(m,ok=true){ const t=document.createElement('div'); t.className='toast'; t.style.background=ok?'#00FF88':'#FF3366'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    async function apiRequest(url,method='GET',body=null){ const u=url.startsWith('/api')?API_BASE+url:url; const o={method,credentials:'include',headers:{'Content-Type':'application/json'}}; if(body) o.body=JSON.stringify(body); const r=await fetch(u,o); const d=await r.json(); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
    async function checkAuth(){ try{ await apiRequest('/api/user/profile'); return true; }catch(e){ window.location.href='/login.html'; return false; } }
    async function loadBalance(){ try{ const d=await apiRequest('/api/user/balance'); document.getElementById('balanceDisplay').innerHTML=`${d.balance.toLocaleString()} MC`; return d.balance; }catch(e){return 0;} }
    async function loadClans(){ const clans=await apiRequest('/api/clans'); document.getElementById('clansList').innerHTML=clans.map(c=>`<div class="clan-card"><div class="clan-header"><div class="clan-avatar">${c.avatar||'🏰'}</div><div><h4>${c.name}</h4><p>${c.members_count||1} участников • ${c.capital||0} MC</p></div></div><button class="btn-join" data-id="${c.id}">Вступить</button></div>`).join(''); document.querySelectorAll('.btn-join').forEach(b=>b.addEventListener('click',async()=>{ try{ await apiRequest('/api/clans/join','POST',{clanId:b.dataset.id}); showToast('Вы вступили в клан!',true); loadClans(); }catch(e){ showToast(e.message,false); } })); }
    async function loadWar(){ try{ const w=await apiRequest('/api/clans/war'); if(w.active) document.getElementById('warContent').innerHTML=`${w.clan1.name} ${w.clan1_score} vs ${w.clan2.name} ${w.clan2_score}`; }catch(e){} }
    document.getElementById('createClanBtn').addEventListener('click',async()=>{ const name=document.getElementById('clanName').value, avatar=document.getElementById('clanAvatar').value; if(!name) return showToast('Введите название',false); try{ await apiRequest('/api/clans/create','POST',{name,avatar}); showToast('Клан создан!',true); loadClans(); }catch(e){ showToast(e.message,false); } });
    let msgs=[{user:'Система',msg:'Добро пожаловать в чат кланов!'}];
    function renderChat(){ const c=document.getElementById('chatMessages'); c.innerHTML=msgs.map(m=>`<div><strong>${m.user}:</strong> ${m.msg}</div>`).join(''); c.scrollTop=c.scrollHeight; }
    document.getElementById('sendChatBtn').addEventListener('click',()=>{ const inp=document.getElementById('chatInput'); if(!inp.value.trim()) return; msgs.push({user:'Вы',msg:inp.value}); renderChat(); inp.value=''; });
    async function init(){ if(!await checkAuth()) return; await loadBalance(); loadClans(); loadWar(); renderChat(); }
    init();
</script>
</body>
</html>
